name: Deploy provisioning backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: 22
  ECR_REPOSITORY: provisioning-backend
  APP_RUNNER_SERVICE_NAME: vedantix-provisioning-api

jobs:
  predeploy-checks:
    name: Predeploy checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Fast integration tests
        run: npm run test:integration -- tests/integration/fast

  deploy:
    name: Build and deploy to App Runner
    runs-on: ubuntu-latest
    needs: predeploy-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ -z "$ACCOUNT_ID" ] || [ "$ACCOUNT_ID" = "None" ]; then
            echo "Failed to resolve AWS account ID"
            exit 1
          fi
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URIs
        id: image
        run: |
          IMAGE_URI="${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          LATEST_URI="${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "latest_uri=$LATEST_URI" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push linux/amd64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${{ steps.image.outputs.image_uri }}" \
            --tag "${{ steps.image.outputs.latest_uri }}" \
            --push .

      - name: Resolve App Runner service ARN
        id: apprunner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --region "${AWS_REGION}" \
            --query "ServiceSummaryList[?ServiceName=='${APP_RUNNER_SERVICE_NAME}'].ServiceArn | [0]" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "App Runner service not found for name: ${APP_RUNNER_SERVICE_NAME}"
            exit 1
          fi

          echo "service_arn=$SERVICE_ARN" >> "$GITHUB_OUTPUT"

      - name: Start App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ steps.apprunner.outputs.service_arn }}" \
            --region "${AWS_REGION}"